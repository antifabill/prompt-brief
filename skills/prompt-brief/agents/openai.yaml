interface:
  display_name: "Prompt Brief"
  short_description: "Agent briefs with GPT-5.5 tuning"
  default_prompt: "Use $prompt-brief to turn this rough task into an executable agent brief I can approve, save, and run. Use `$prompt-brief 5.5: ...` when I want GPT-5.5 tuning. Do not execute the task yet; first return one prompt-brief card with the engineered brief, assumptions, mode, and approval menu: [paste rough task here]"
policy:
  allow_implicit_invocation: false
