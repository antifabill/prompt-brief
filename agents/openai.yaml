interface:
  display_name: "Prompt Brief"
  short_description: "Turn rough tasks into agent briefs"
  default_prompt: "Use $prompt-brief to turn this rough task into an executable agent brief I can approve, save, and run. Do not execute the task yet; first return the engineered brief, assumptions, and approval menu: [paste rough task here]"
policy:
  allow_implicit_invocation: false
